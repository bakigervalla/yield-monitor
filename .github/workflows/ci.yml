name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: python -c "from app.main import app; print('App imports OK')"

      - name: Syntax check
        run: python -m py_compile app/main.py app/db/database.py app/models/schemas.py app/chat.py && echo "Syntax OK"
